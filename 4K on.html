<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>সত্য'র ফিফা লাইভ | ফুটবল ছুটছে</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    background: #0a1f0a;
    background-image: radial-gradient(circle at 20% 30%, #1a3a1a 2%, transparent 3%),
                      radial-gradient(circle at 80% 70%, #1a3a1a 1%, transparent 2%),
                      linear-gradient(0deg, #0a1f0a 0%, #143014 50%, #0a1f0a 100%);
    min-height:100vh; display:flex; justify-content:center; align-items:center;
    font-family: 'Arial Black', 'Impact', sans-serif;
    color:#fff;
    overflow:hidden;
    position:relative;
  }
  /* ফুটবল মাঠের লাইন */
  body::before {
    content:""; position:fixed; inset:0;
    background: repeating-linear-gradient(90deg, rgba(255,255,255,0.05) 0px, rgba(255,255,255,0.05) 1px, transparent 1px, transparent 80px);
    pointer-events:none; z-index:0;
  }
  /* চলমান ফুটবল */
  .ball {
    position:fixed; bottom:20px; left:-50px; z-index:2;
    width:60px; height:60px; background:radial-gradient(circle at 30% 30%, white, #ccc);
    border-radius:50%; box-shadow:0 0 20px rgba(0,0,0,0.5);
    animation: kickBall 4s linear infinite;
    background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><polygon points="50,5 68,30 95,35 75,55 80,85 50,75 20,85 25,55 5,35 32,30" fill="black" opacity="0.3"/></svg>');
    background-size:cover;
  }
  @keyframes kickBall {
    0% { left:-60px; transform: rotate(0deg); }
    20% { bottom:80%; left:20%; transform: rotate(180deg); }
    40% { bottom:30%; left:50%; transform: rotate(360deg); }
    60% { bottom:70%; left:70%; transform: rotate(540deg); }
    80% { bottom:10%; left:85%; transform: rotate(720deg); }
    100% { left:110%; transform: rotate(900deg); }
  }
  .container { width:100%; max-width:1200px; padding:15px; position:relative; z-index:1; }
  .header { text-align:center; margin-bottom:10px; }
  .header h1 {
    font-size:clamp(2rem, 7vw, 4.5rem);
    background:linear-gradient(45deg, #FFD700, #FF8C00);
    -webkit-background-clip:text; -webkit-text-fill-color:transparent;
    background-clip:text;
    text-shadow:0 0 30px rgba(255,215,0,0.7);
    animation: championPulse 1.5s infinite;
    letter-spacing:2px;
    font-family:'Arial Black', Impact, sans-serif;
  }
  @keyframes championPulse {
    0%,100% { filter:drop-shadow(0 0 15px gold); }
    50% { filter:drop-shadow(0 0 35px orange); }
  }
  .subtitle {
    font-size:1.2rem; color:#ffd700; background:rgba(0,0,0,0.5); display:inline-block;
    padding:5px 25px; border-radius:20px; text-transform:uppercase; letter-spacing:3px;
  }
  .player-card {
    background:rgba(0,20,0,0.7); backdrop-filter:blur(10px);
    border-radius:20px; overflow:hidden;
    box-shadow:0 15px 40px rgba(0,0,0,0.8), 0 0 30px rgba(255,215,0,0.4);
    border:2px solid gold;
    position:relative;
  }
  /* গোল সেলিব্রেশন ফ্রেম */
  .player-card::before {
    content:""; position:absolute; inset:0; border-radius:20px;
    background:linear-gradient(45deg, transparent, rgba(255,215,0,0.15), transparent);
    pointer-events:none; z-index:2;
  }
  video { display:block; width:100%; max-height:65vh; background:#000; }
  .controls-bar {
    display:flex; align-items:center; justify-content:space-between;
    padding:10px 20px; background:rgba(0,0,0,0.7);
    flex-wrap:wrap; gap:10px; border-top:1px solid gold;
  }
  .watermark {
    font-weight:bold; font-size:1.2rem;
    background:gold; color:#000; padding:3px 15px; border-radius:5px;
    letter-spacing:1px;
  }
  .quality-selector {
    background:#1a3a1a; color:gold; border:1px solid gold;
    padding:8px 16px; border-radius:20px; font-weight:bold;
    outline:none; cursor:pointer;
  }
  .info { color:gold; margin-left:10px; font-family:monospace; }
  .footer { text-align:center; margin-top:15px; color:gold; opacity:0.7; }
  .loading-overlay {
    position:absolute; top:50%; left:50%; transform:translate(-50%,-50%);
    color:gold; background:rgba(0,0,0,0.8); padding:15px 30px;
    border-radius:10px; display:none; z-index:5; font-weight:bold;
  }
</style>
</head>
<body>
  <div class="ball"></div>
  <div class="container">
    <div class="header">
      <h1>⚽ সত্য'র ফুটবল লাইভ ⚽</h1>
      <div class="subtitle">ফুটবল ছুটছে • 4K তে দেখ</div>
    </div>
    <div class="player-card">
      <video id="video" controls playsinline></video>
      <div class="controls-bar">
        <span class="watermark">?? সত্য</span>
        <div>
          <select id="qualitySelect" class="quality-selector">
            <option value="auto">অটো</option>
          </select>
          <span id="currentQuality" class="info"></span>
        </div>
      </div>
      <div id="loading" class="loading-overlay">⏳ গোল আসছে...</div>
    </div>
    <div class="footer">© সত্য'র ফ্রি ফুটবল স্ট্রিম • পাইরেসি নয়, ভালোবাসা</div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
  <script>
    const video = document.getElementById('video');
    const qualitySelect = document.getElementById('qualitySelect');
    const currentQualityEl = document.getElementById('currentQuality');
    const loadingEl = document.getElementById('loading');
    const m3u8Url = "https://foxdtc-video.akamaized.net/ZXhwPTE3ODQ1Njk4MTc7YWNsPS8qO3dzaWQ9ZGMxZjljNTI3YmNiYWM3MTY5ZDA4ZDgyNjBkMDg2ZjNfZm94ZHRjX3dlYl9lbi1VUztobWFjPVBvcFdWWUpTMERKUjNMTEVZOWZDOVFFVDhKbklzSFpBaWRSMnBVaXRtVTA9/live/tx001-ue2/index.m3u8";

    let hls = null;
    let levels = [];

    function initPlayer() {
      loadingEl.style.display = 'block';
      if (Hls.isSupported()) {
        hls = new Hls({
          startLevel: -1,
          capLevelToPlayerSize: false,
          autoStartLoad: true,
        });
        hls.loadSource(m3u8Url);
        hls.attachMedia(video);

        hls.on(Hls.Events.MANIFEST_PARSED, (event, data) => {
          loadingEl.style.display = 'none';
          levels = hls.levels;
          populateQualitySelector(levels);
          forceHighestQuality();
          video.play().catch(() => {});
        });

        hls.on(Hls.Events.LEVEL_SWITCHED, () => updateCurrentQuality());
        hls.on(Hls.Events.ERROR, (event, data) => {
          if (data.fatal) {
            loadingEl.innerHTML = "❌ লিংক মেয়াদ শেষ!";
            loadingEl.style.display = 'block';
          }
        });
      } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
        video.src = m3u8Url;
        video.addEventListener('loadedmetadata', () => { loadingEl.style.display = 'none'; video.play(); });
      } else {
        loadingEl.innerHTML = "❌ ব্রাউজার সাপোর্ট নেই";
      }
    }

    function populateQualitySelector(levels) {
      qualitySelect.innerHTML = '<option value="auto">অটো (4K)</option>';
      if (levels) {
        levels.forEach((level, index) => {
          let label = `${level.height}p`;
          if (level.height >= 2160) label = `? 4K (${level.height}p)`;
          else if (level.height >= 1440) label = `2K (${level.height}p)`;
          qualitySelect.innerHTML += `<option value="${index}">${label}</option>`;
        });
      }
      qualitySelect.addEventListener('change', onQualityChange);
    }

    function forceHighestQuality() {
      if (hls && levels.length > 0) {
        let maxLevel = 0, maxHeight = 0;
        levels.forEach((lvl, idx) => { if (lvl.height > maxHeight) { maxHeight = lvl.height; maxLevel = idx; } });
        hls.currentLevel = maxLevel;
        qualitySelect.value = maxLevel;
        updateCurrentQuality();
      }
    }

    function onQualityChange() {
      if (!hls) return;
      hls.currentLevel = qualitySelect.value === 'auto' ? -1 : parseInt(qualitySelect.value);
      updateCurrentQuality();
    }

    function updateCurrentQuality() {
      if (!hls || !levels.length) return;
      const cur = hls.currentLevel;
      if (cur === -1) currentQualityEl.textContent = 'অটো';
      else if (cur < levels.length) currentQualityEl.textContent = `${levels[cur].height}p @ ${(levels[cur].bitrate/1e6).toFixed(1)} Mbps`;
    }

    initPlayer();
  </script>
</body>
</html>
